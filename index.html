<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Standoff 2 · Mines</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #121826;
            border-radius: 32px;
            padding: 32px 28px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #2a2f3f;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo span {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        h1 {
            color: white;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        .sub {
            color: #6c7180;
            text-align: center;
            font-size: 13px;
            margin-bottom: 28px;
        }
        input {
            width: 100%;
            background: #1e2432;
            border: 1px solid #2f3545;
            padding: 14px 16px;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            margin-bottom: 14px;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #ff4757;
        }
        button {
            width: 100%;
            background: #ff4757;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button.secondary {
            background: #2a2f42;
        }
        button.secondary:active {
            transform: scale(0.97);
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #4a4f62;
            margin-top: 24px;
        }
        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #1e2432, #1a1f2e);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #ffd96633;
        }
        .balance {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .deposit-highlight {
            background: linear-gradient(135deg, #2a2f42, #1e2432);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #2ecc7133;
        }
        .deposit-highlight strong {
            font-size: 18px;
            color: #2ecc71;
        }
        .ton-address {
            background: #1a1f2e;
            padding: 12px;
            border-radius: 14px;
            font-size: 11px;
            word-break: break-all;
            font-family: monospace;
            margin: 15px 0;
            border: 1px solid #2f3545;
        }
        .mines-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .mine-cell {
            aspect-ratio: 1;
            background: #1e2432;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.1s;
            font-weight: bold;
            border: 1px solid #2f3545;
        }
        .mine-cell:active {
            transform: scale(0.95);
        }
        .info-panel {
            background: linear-gradient(135deg, #1e2432, #1a1f2e);
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #ff475733;
        }
        .info-panel span {
            font-size: 16px;
            font-weight: bold;
        }
        .info-panel span:first-child {
            color: #2ecc71;
        }
        .info-panel span:last-child {
            color: #ff4757;
        }
        .withdraw-section {
            background: #1e2432;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .withdraw-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }
        .withdraw-option {
            background: #2a2f42;
            padding: 12px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3a3f52;
        }
        .withdraw-option:hover {
            background: #3a3f52;
            transform: scale(1.01);
        }
